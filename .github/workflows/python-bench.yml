name: Python Versions Benchmark

on:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    strategy:
      # Запускаем тест параллельно на 4 версиях Python
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
      # fail-fast: false гарантирует, что если одна версия упадет, остальные продолжат тест
      fail-fast: false

    env:
      TEST_URL: "https://ftp.ncbi.nlm.nih.gov/genomes/all/GCF/000/001/405/GCF_000001405.40_GRCh38.p14/GCF_000001405.40_GRCh38.p14_genomic.fna.gz"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        # Принудительно ставим конкретную версию Python через uv
        run: uv python install ${{ matrix.python-version }}

      - name: Install HydraStream in virtual environment
        # Создаем venv именно с нужной версией Python, чтобы тест был кристально чистым
        run: |
          uv venv bench_env --python ${{ matrix.python-version }}
          uv pip install -p bench_env .

      - name: Benchmark HydraStream (15 connections, No Hash)
        run: |
          echo "=================================================="
          echo "Testing HydraStream on Python ${{ matrix.python-version }}"
          echo "=================================================="

          # Вызываем бинарник прямо из изолированного venv
          time ./bench_env/bin/hs $TEST_URL -t 15 -q --no-verify -o ./hs_out

          rm -rf ./hs_out
